<body>
<!--Coloquei br, para que não tivesse um espaço grande entre uma linha e outra. Meu objetivo era um texto corrido e 
somente espaçado em partes específicas-->
     <br>
        Em uma frase podemos definir as <strong>ênfases</strong> desejadas, ou seja, as palavras mais <em>importantes</em>.

     <br>
        È possíel incluiruma palvra <small>menor</small> que as demais.

    <br>
        Usar recursos de subscrito e sobrescrito:

<!--Strong = deixa as palavras em negrito ecolocando ênfase
Small = deixa a palavra menorque o normal
Em = deixa a palavra em itálico-->
    <br>H<sub>2</sub>O
    <br>8<sup>2
        <!-- sub = coloca o texto subscrito
         sup = coloca o texto sobrescrito-->
        <br>
        <br> Alguns textos <del>excluídos</del>. além de fazer combinações:
        <!--Del = Deixa a palavra tachada (riscada no meio).-->
        <br><strong>H<sub>2</sub>O</strong>
        <br><em>8<sup>2</sup></em>
        <br><strong>Palavras<em>Importantes.</em></strong>

</body>
</html>
